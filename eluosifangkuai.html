<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>俄罗斯方块 - 极限挑战版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background-color: #111;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }
        canvas { background-color: #000; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            line-height: 1.8;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        #game-over-screen {
            position: absolute;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            width: 100%; height: 100%;
            z-index: 10;
        }
        #game-over-screen h1 { font-size: 48px; margin-bottom: 20px; color: #ff4444; }
        #game-over-screen p { font-size: 28px; margin-bottom: 30px; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; border: none; background: #00ffcc; color: #000; font-weight: bold; border-radius: 5px; }
        button:hover { background: #00e6b8; }
    </style>
</head>
<body>

    <div id="ui-layer">
        分数: <span id="score">0</span><br>
        等级: <span id="level">1</span> / 8<br>
        消除: <span id="lines">0</span> / 7000
    </div>

    <div id="game-over-screen">
        <h1 id="end-title">游戏结束</h1>
        <p>最终总分数: <span id="final-score">0</span></p>
        <button onclick="location.reload()">重新开始</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI 元素
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const linesEl = document.getElementById('lines');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreEl = document.getElementById('final-score');
        const endTitle = document.getElementById('end-title');

        // 游戏配置
        const COLS = 10;
        const ROWS = 20;
        const COLORS = ['#00ffff', '#ffff00', '#aa00ff', '#00ff00', '#ff0000', '#0000ff', '#ffaa00'];
        
        // 升级所需累计消除行数
        const LEVEL_THRESHOLDS = [0, 50, 150, 350, 750, 1550, 3150, 6350]; 

        // 8个等级的下落速度 (毫秒/格)
        const DROP_INTERVALS = [800, 700, 600, 500, 400, 300, 200, 100];

        let blockSize, offsetX, offsetY;
        let board = [];
        let score = 0;
        let totalLines = 0;
        let level = 1;
        let gameOver = false;
        let dropCounter = 0;
        let lastTime = 0;

        // 1. 初始化画布与网格
        function setupCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const maxWidth = window.innerWidth * 0.9;
            const maxHeight = window.innerHeight * 0.9;
            
            blockSize = Math.floor(Math.min(maxWidth / COLS, maxHeight / ROWS));
            canvas.width = blockSize * COLS * dpr;
            canvas.height = blockSize * ROWS * dpr;
            canvas.style.width = `${blockSize * COLS}px`;
            canvas.style.height = `${blockSize * ROWS}px`;
            ctx.scale(dpr, dpr);
        }
        setupCanvas();
        window.addEventListener('resize', setupCanvas);

        function initBoard() {
            board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        }
        initBoard();

        // 2. 方块逻辑
        const SHAPES = [
            [[1, 1, 1, 1]],                         // I
            [[1, 1], [1, 1]],                        // O
            [[0, 1, 0], [1, 1, 1]],                  // T
            [[1, 0, 0], [1, 1, 1]],                  // L
            [[0, 0, 1], [1, 1, 1]],                  // J
            [[0, 1, 1], [1, 1, 0]],                  // S
            [[1, 1, 0], [0, 1, 1]]                   // Z
        ];

        function createPiece() {
            const type = Math.floor(Math.random() * SHAPES.length);
            return {
                shape: SHAPES[type].map(row => [...row]),
                color: COLORS[type],
                x: Math.floor(COLS / 2) - Math.ceil(SHAPES[type][0].length / 2),
                y: 0
            };
        }

        let currentPiece = createPiece();
        let nextPiece = createPiece();

        // 3. 碰撞检测
        function collide(piece, offX = 0, offY = 0) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x] !== 0) {
                        const newX = piece.x + x + offX;
                        const newY = piece.y + y + offY;
                        if (newX < 0 || newX >= COLS || newY >= ROWS) return true;
                        if (newY >= 0 && board[newY][newX]) return true;
                    }
                }
            }
            return false;
        }

        // 4. 合并与消除
        function mergePiece() {
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x] !== 0) {
                        const boardY = currentPiece.y + y;
                        if (boardY < 0) {
                            triggerGameOver(false);
                            return;
                        }
                        board[boardY][currentPiece.x + x] = currentPiece.color;
                    }
                }
            }
            clearLines();
        }

        function clearLines() {
            let linesCleared = 0;
            let y = ROWS - 1;
            while (y >= 0) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    // 不递减 y，因为当前行已被新的顶部行填充
                } else {
                    y--;
                }
            }

            if (linesCleared > 0) {
                // 指数计分: 1行1分, 2行2分, 3行4分, 4行8分
                score += Math.pow(2, linesCleared - 1);
                totalLines += linesCleared;
                
                // 检查是否达到7000行极限
                if (totalLines >= 7000) {
                    triggerGameOver(true);
                    return;
                }

                // 检查升级
                for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
                    if (totalLines >= LEVEL_THRESHOLDS[i]) {
                        level = i + 1;
                        break;
                    }
                }
                updateUI();
            }
        }

        // 5. 旋转
        function rotatePiece() {
            const originalShape = currentPiece.shape;
            currentPiece.shape = currentPiece.shape[0].map((_, i) => 
                currentPiece.shape.map(row => row[i]).reverse()
            );
            if (collide(currentPiece)) {
                currentPiece.shape = originalShape;
            }
        }

        // 6. 游戏结束处理
        function triggerGameOver(isWin) {
            gameOver = true;
            endTitle.innerText = isWin ? "🎉 极限通关！" : "💥 游戏结束";
            endTitle.style.color = isWin ? "#00ffcc" : "#ff4444";
            finalScoreEl.innerText = score;
            gameOverScreen.style.display = 'flex';
        }

        function updateUI() {
            scoreEl.innerText = score;
            levelEl.innerText = level;
            linesEl.innerText = totalLines;
        }

        // 7. 绘制
        function drawBlock(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * blockSize, y * blockSize, blockSize - 1, blockSize - 1);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制已固定的方块
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) drawBlock(x, y, board[y][x]);
                }
            }
            // 绘制当前方块
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        drawBlock(currentPiece.x + x, currentPiece.y + y, currentPiece.color);
                    }
                }
            }
        }

        // 8. 主循环
        function update(time = 0) {
            if (gameOver) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;

            if (dropCounter > DROP_INTERVALS[level - 1]) {
                if (!collide(currentPiece, 0, 1)) {
                    currentPiece.y++;
                } else {
                    mergePiece();
                    currentPiece = nextPiece;
                    nextPiece = createPiece();
                    if (collide(currentPiece)) triggerGameOver(false);
                }
                dropCounter = 0;
            }

            draw();
            requestAnimationFrame(update);
        }

        // 9. 键盘控制
        window.addEventListener('keydown', e => {
            if (gameOver) return;
            if (e.key === 'ArrowLeft' && !collide(currentPiece, -1, 0)) currentPiece.x--;
            if (e.key === 'ArrowRight' && !collide(currentPiece, 1, 0)) currentPiece.x++;
            if (e.key === 'ArrowDown') {
                if (!collide(currentPiece, 0, 1)) currentPiece.y++;
            }
            if (e.key === 'ArrowUp') rotatePiece();
        });

        requestAnimationFrame(update);
    </script>
</body>
</html>
