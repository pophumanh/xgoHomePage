<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简贪吃蛇</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --snake-color: #4ade80;
            --food-color: #f87171;
            --grid-color: #2a2a2a;
            --text-color: #e5e5e5;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            background-color: var(--bg-color);
            border: 2px solid #333;
            border-radius: 4px;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            backdrop-filter: blur(2px);
        }

        .hidden { display: none !important; }

        h1 { margin: 0 0 10px; font-size: 2rem; color: var(--snake-color); text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }
        p { margin: 5px 0; font-size: 1rem; opacity: 0.9; }
        
        .btn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 1rem;
            background: var(--snake-color);
            color: #000;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }

        .score-board {
            margin-bottom: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="score-board">得分: <span id="score">0</span></div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <!-- 开始/暂停界面 -->
        <div id="startScreen" class="overlay">
            <h1>贪吃蛇</h1>
            <p>方向键 / WASD 控制</p>
            <p>空格键 暂停</p>
            <button class="btn" id="startBtn">开始游戏</button>
        </div>

        <!-- 游戏结束界面 -->
        <div id="gameOverScreen" class="overlay hidden">
            <h1 style="color: var(--food-color); text-shadow: 0 0 10px rgba(248, 113, 113, 0.5);">游戏结束</h1>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button class="btn" id="restartBtn">再来一局</button>
        </div>
    </div>

<script>
/**
 * 贪吃蛇游戏逻辑
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const finalScoreEl = document.getElementById('finalScore');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');

// 游戏配置
const GRID_SIZE = 20; // 格子大小
const TILE_COUNT = canvas.width / GRID_SIZE; // 格子数量 (20x20)
const GAME_SPEED = 120; // 毫秒/帧，数值越小速度越快

// 游戏状态
let snake = [];
let food = { x: 0, y: 0 };
let velocity = { x: 0, y: 0 };
let nextVelocity = { x: 0, y: 0 }; // 缓冲下一次方向，防止快速按键自杀
let score = 0;
let gameLoop;
let isRunning = false;

// 初始化
function initGame() {
    snake = [
        { x: 10, y: 10 }, // 蛇头
        { x: 9, y: 10 },
        { x: 8, y: 10 }
    ];
    velocity = { x: 1, y: 0 };
    nextVelocity = { x: 1, y: 0 };
    score = 0;
    scoreEl.textContent = score;
    spawnFood();
}

// 生成食物
function spawnFood() {
    let valid = false;
    while (!valid) {
        food.x = Math.floor(Math.random() * TILE_COUNT);
        food.y = Math.floor(Math.random() * TILE_COUNT);
        // 确保食物不在蛇身上
        valid = !snake.some(segment => segment.x === food.x && segment.y === food.y);
    }
}

// 游戏主循环
function update() {
    // 应用缓冲的方向
    velocity = { ...nextVelocity };

    // 1. 移动蛇头
    const head = { 
        x: snake[0].x + velocity.x, 
        y: snake[0].y + velocity.y 
    };

    // 2. 碰撞检测：撞墙
    if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
        return gameOver();
    }

    // 3. 碰撞检测：撞自己
    if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        return gameOver();
    }

    // 4. 插入新头
    snake.unshift(head);

    // 5. 吃食物判断
    if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        spawnFood();
        // 吃到食物不移除尾巴（蛇变长）
    } else {
        // 没吃到食物，移除尾巴（保持长度）
        snake.pop();
    }

    draw();
}

// 绘制圆角矩形的辅助函数（替代 roundRect）
function drawRoundedRect(x, y, width, height, radius) {
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
    ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
}

// 绘制画面
function draw() {
    // 清空画布
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-color');
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 绘制网格线（可选，增加质感）
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--grid-color');
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= TILE_COUNT; i++) {
        ctx.beginPath();
        ctx.moveTo(i * GRID_SIZE, 0);
        ctx.lineTo(i * GRID_SIZE, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * GRID_SIZE);
        ctx.lineTo(canvas.width, i * GRID_SIZE);
        ctx.stroke();
    }

    // 绘制蛇
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--snake-color');
    snake.forEach((segment, index) => {
        // 蛇头稍微亮一点或加圆角效果（这里用简单的透明度区分）
        ctx.globalAlpha = index === 0 ? 1 : 0.8;
        
        // 使用自定义的圆角矩形函数
        const x = segment.x * GRID_SIZE + 1;
        const y = segment.y * GRID_SIZE + 1;
        const w = GRID_SIZE - 2;
        const h = GRID_SIZE - 2;
        const r = 4;
        
        drawRoundedRect(x, y, w, h, r);
        ctx.fill();
    });
    ctx.globalAlpha = 1;

    // 绘制食物
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--food-color');
    ctx.beginPath();
    ctx.arc(
        food.x * GRID_SIZE + GRID_SIZE / 2, 
        food.y * GRID_SIZE + GRID_SIZE / 2, 
        GRID_SIZE / 2 - 2, 
        0, 
        Math.PI * 2
    );
    ctx.fill();
}

// 游戏结束
function gameOver() {
    isRunning = false;
    clearInterval(gameLoop);
    finalScoreEl.textContent = score;
    gameOverScreen.classList.remove('hidden');
}

// 开始游戏
function startGame() {
    initGame();
    draw(); // 先画一帧初始状态
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    isRunning = true;
    gameLoop = setInterval(update, GAME_SPEED);
}

// 键盘控制
window.addEventListener('keydown', (e) => {
    if (!isRunning) {
        if (e.code === 'Space' || e.code === 'Enter') startGame();
        return;
    }

    switch (e.key) {
        case 'ArrowUp': case 'w': case 'W':
            if (velocity.y === 0) nextVelocity = { x: 0, y: -1 };
            break;
        case 'ArrowDown': case 's': case 'S':
            if (velocity.y === 0) nextVelocity = { x: 0, y: 1 };
            break;
        case 'ArrowLeft': case 'a': case 'A':
            if (velocity.x === 0) nextVelocity = { x: -1, y: 0 };
            break;
        case 'ArrowRight': case 'd': case 'D':
            if (velocity.x === 0) nextVelocity = { x: 1, y: 0 };
            break;
    }
});

// 按钮事件
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

// 初始绘制一帧背景
draw();

</script>
</body>
</html>
