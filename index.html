<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XGO 游戏大厅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0b0c10;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 50px;
            background: linear-gradient(90deg, #00ffcc, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0,255,204,0.3);
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1000px;
        }
        .game-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #fff;
        }
        .game-card:hover {
            transform: translateY(-10px);
            background: rgba(0, 255, 204, 0.1);
            border-color: #00ffcc;
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.2);
        }
        .game-icon { font-size: 60px; margin-bottom: 20px; }
        .game-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .game-desc { font-size: 14px; color: #aaa; }
        
        @media (max-width: 600px) {
            h1 { font-size: 32px; margin-bottom: 30px; }
            .game-grid { gap: 20px; }
            .game-card { padding: 30px 15px; }
        }
    </style>
</head>
<body>
    <h1>🎮 XGO 游戏大厅</h1>
    <div class="game-grid">
        <a href="tanchishe.html" class="game-card">
            <div class="game-icon">🐍</div>
            <div class="game-title">贪吃蛇</div>
            <div class="game-desc">经典街机，考验反应与策略</div>
        </a>
        <a href="feijidachongzi.html" class="game-card">
            <div class="game-icon">✈️</div>
            <div class="game-title">飞机打虫子</div>
            <div class="game-desc">全屏射击，消灭所有入侵者</div>
        </a>
        <a href="eluosifangkuai.html" class="game-card">
            <div class="game-icon">🧱</div>
            <div class="game-title">俄罗斯方块</div>
            <div class="game-desc">8级难度，挑战7000行极限</div>
        </a>
        <a href="migong.html" class="game-card">
            <div class="game-icon">🗺️</div>
            <div class="game-title">探索地图</div>
            <div class="game-desc">黑暗迷宫，寻找唯一出口</div>
        </a>
    </div>
</body>
</html>
