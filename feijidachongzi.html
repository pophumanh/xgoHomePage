<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小飞机打虫子 - 全屏版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background-color: #0b0c10;
            width: 100vw;
            height: 100vh;
        }
        canvas { display: block; }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Segoe UI', sans-serif;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="ui-layer">得分: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        
        // 1. 全屏自适应与高清屏适配
        function setupCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.scale(dpr, dpr);
        }
        setupCanvas();
        window.addEventListener('resize', setupCanvas);

        // 2. 游戏状态
        let score = 0;
        const keys = {};
        const player = { 
            x: 0, y: 0, w: 50, h: 60, speed: 8, 
            color: '#00ffcc', 
            draw: function(ctx) {
                ctx.save();
                ctx.translate(this.x + this.w/2, this.y + this.h/2);
                
                // 机身
                ctx.fillStyle = '#00ffcc';
                ctx.beginPath();
                ctx.moveTo(0, -this.h/2);
                ctx.lineTo(-10, this.h/3);
                ctx.lineTo(10, this.h/3);
                ctx.closePath();
                ctx.fill();

                // 尾翼
                ctx.fillStyle = '#00b38f';
                ctx.beginPath();
                ctx.moveTo(-15, this.h/3);
                ctx.lineTo(15, this.h/3);
                ctx.lineTo(5, this.h/2);
                ctx.lineTo(-5, this.h/2);
                ctx.closePath();
                ctx.fill();

                // 机翼
                ctx.fillStyle = '#00e6b8';
                ctx.beginPath();
                ctx.moveTo(-5, 0);
                ctx.lineTo(-this.w/2, 15);
                ctx.lineTo(-this.w/2, 20);
                ctx.lineTo(-5, 10);
                ctx.closePath();
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(5, 0);
                ctx.lineTo(this.w/2, 15);
                ctx.lineTo(this.w/2, 20);
                ctx.lineTo(5, 10);
                ctx.closePath();
                ctx.fill();

                // 驾驶舱
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.ellipse(0, -5, 4, 8, 0, 0, Math.PI*2);
                ctx.fill();

                ctx.restore();
            }
        };

        let bullets = [];
        let bugs = [];

        function initPlayer() {
            player.x = window.innerWidth / 2 - player.w / 2;
            player.y = window.innerHeight - 100;
        }
        initPlayer();

        // 3. 输入监听
        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ') shoot();
        });
        window.addEventListener('keyup', e => keys[e.key] = false);

        function shoot() {
            bullets.push({
                x: player.x + player.w / 2 - 2,
                y: player.y,
                w: 4, h: 15, speed: 10
            });
        }

        function spawnBug() {
            bugs.push({
                x: Math.random() * (window.innerWidth - 20),
                y: -20,
                w: 15, h: 15, // 虫子缩小
                speed: 2 + Math.random() * 4,
                draw: function(ctx) {
                    ctx.save();
                    ctx.translate(this.x + this.w/2, this.y + this.h/2);
                    // 身体
                    ctx.fillStyle = '#ff4444';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.w/2, 0, Math.PI*2);
                    ctx.fill();
                    // 触角
                    ctx.strokeStyle = '#ff4444';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(-3, -this.h/2);
                    ctx.lineTo(-6, -this.h/2 - 5);
                    ctx.moveTo(3, -this.h/2);
                    ctx.lineTo(6, -this.h/2 - 5);
                    ctx.stroke();
                    ctx.restore();
                }
            });
        }

        function isCollide(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
        }

        // 4. 主循环
        let lastBugSpawn = 0;
        function gameLoop(timestamp) {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

            // 玩家移动
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < window.innerWidth - player.w) player.x += player.speed;
            if (keys['ArrowUp'] && player.y > 0) player.y -= player.speed;
            if (keys['ArrowDown'] && player.y < window.innerHeight - player.h) player.y += player.speed;

            // 生成虫子
            if (timestamp - lastBugSpawn > 800) {
                spawnBug();
                lastBugSpawn = timestamp;
            }

            // 子弹
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.y -= b.speed;
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(b.x, b.y, b.w, b.h);
                if (b.y < -20) bullets.splice(i, 1);
            }

            // 虫子
            for (let i = bugs.length - 1; i >= 0; i--) {
                const bug = bugs[i];
                bug.y += bug.speed;
                bug.draw(ctx);
                if (bug.y > window.innerHeight + 30) bugs.splice(i, 1);
            }

            // 碰撞
            for (let i = bullets.length - 1; i >= 0; i--) {
                for (let j = bugs.length - 1; j >= 0; j--) {
                    if (isCollide(bullets[i], bugs[j])) {
                        bullets.splice(i, 1);
                        bugs.splice(j, 1);
                        score += 10;
                        scoreEl.innerText = score;
                        break;
                    }
                }
            }

            player.draw(ctx);
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
